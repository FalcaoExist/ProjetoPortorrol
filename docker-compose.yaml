
services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - app-network

  devtools:
    build: ./devtools
    container_name: devtools
    working_dir: /work
    volumes:
      - ./:/work
    stdin_open: true
    tty: true
    env_file:
      - .env
    networks:
      - app-network

volumes:
  frontend_node_modules:
    driver: local

networks:
  app-network:
    driver: bridge
